# =========================================================
# hexo-theme-hmhv — まぶしい、青春の記録。
# Pastel-modern personal blog theme
# =========================================================

# ----- Site identity -----
site:
  # Shown in the header next to the logo mark
  brand: hmhv
  # Main tagline on the hero (accepts HTML; <span class="mk"> adds the apricot marker)
  hero_title: '<span class="mk">まぶしい</span>、<br>青春の記録。'
  # Latin / eyebrow line above the hero title
  hero_eyebrow: 'hmhv blog —'
  # Sub copy under the hero title
  hero_sub: 'a record of dazzling youth — notes, photos, and sometimes nothing at all. 気まぐれに更新します。'
  # Top-right volume stamp ('2026 · vol.07' style). Leave blank to hide.
  hero_volume: '2026 · vol.07'

# ----- Navigation -----
# Key = label shown. Value = url (absolute or root-relative).
menu:
  Home:     /
  Archives: /archives/
  Tags:     /tags/
  Apps:     /apps/
  About:    /about/

# ----- Social & footer links -----
social:
  twitter:   '#'
  instagram: '#'
  rss:       /atom.xml
  email:     'mailto:hello@example.com'

footer:
  copyright: '© 2026 hmhv · まぶしい、青春の記録。'

# ----- Home layout -----
home:
  # Show big hero block on index page
  hero: false
  # Slug of a post to feature as "PINNED" above the recent list. Leave blank to disable.
  pinned_post: ''
  # Posts per page on home (falls back to site index_generator.per_page)
  per_page: 8
  # Show tag cloud below the post list
  show_tag_cloud: true

# ----- Post page -----
post:
  # Show prev/next post nav at the bottom of a post
  show_nav: true
  # Show "read time" in meta row (minutes, rough estimate)
  show_read_time: true
  # ~chars-per-minute for JP/EN mixed prose
  read_time_cpm: 500

# ----- Archive page -----
archive:
  # Group list headings by year ("2026" big watermark)
  group_by_year: true

# ----- Color / tag chip variants -----
# Map tag name → chip variant (sky / sun / blush / mint / lilac / default)
# Leave unmapped tags styled as "default".
tag_chip:
  summer: sun
  photos: sky
  diary:  blush
  tokyo:  lilac
  notes:  mint

# ----- Assets -----
# Set to a relative path in source/images/ OR a full URL. Empty = hide icon, text-only.
logo: ''
favicon: /images/favicon.svg

# ----- Fonts (Google Fonts) -----
# Change these to swap the type system. Families must exist on Google Fonts.
fonts:
  enable: true
  families:
    - 'Zen+Kaku+Gothic+New:wght@400;500;700;900'
    - 'Shippori+Mincho:wght@400;500;700'
    - 'Outfit:wght@300;400;500;700'
    - 'JetBrains+Mono:wght@400;500'
    - 'Playfair+Display:ital,wght@1,500;1,600;1,700'
